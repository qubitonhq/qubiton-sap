name: abaplint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run abaplint with SAP stdlib stubs (signal-filtered)
        run: ./scripts/lint.sh --signal
