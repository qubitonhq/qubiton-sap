name: abaplint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run abaplint with SAP stdlib stubs
        run: ./scripts/lint.sh --signal

      - name: Strict gate — fail on any non-noise error
        run: |
          # Run the signal-filtered lint and fail the job if any actual
          # error lines are emitted (the trailing summary line is the
          # only acceptable line of output).
          out=$(./scripts/lint.sh --signal 2>&1)
          if echo "$out" | grep -E '^src/.*\[E\]' | head -1 | grep -q '\[E\]'; then
            echo "❌ abaplint surfaced real issues:"
            echo "$out"
            exit 1
          fi
          echo "✓ abaplint clean (all errors are SAP-stdlib noise filtered out)"
